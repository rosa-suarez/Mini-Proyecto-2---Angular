<div class="card">

  <img [src]="'img/' + producto.imagen">

  <h3>{{ producto.nombre }}</h3>

  <p [ngClass]="producto.disponible == 1 ? 'verde' : 'rojo'">
    {{ producto.disponible == 1 ? 'Disponible' : 'Agotado' }}
  </p>

  <p class="precio">{{ producto.precio | currency }}</p>

  <button [routerLink]="['/producto', producto.id]">
    Ver detalle
  </button>

  <button (click)="agregarClick.emit(producto)">
    Agregar al carrito
  </button>

</div>
