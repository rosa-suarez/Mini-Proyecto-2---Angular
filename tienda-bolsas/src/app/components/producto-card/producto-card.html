<div class="card">

  <img [src]="'img/' + producto.imagen">

  <h3>{{ producto.nombre }}</h3>

  <p [ngClass]="producto.stock > 0 ? 'verde' : 'rojo'">
    {{ producto.stock > 0 ? 'Disponible' : 'Agotado' }}
  </p>

  <p class="precio">{{ producto.precio | currency }}</p>

  <button [routerLink]="['/producto', producto.id]">
    Ver detalle
  </button>

  <button 
    (click)="agregarClick.emit(producto)"
    [disabled]="producto.stock === 0">
    Agregar al carrito
  </button>

</div>
