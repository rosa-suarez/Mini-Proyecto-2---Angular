<h2>Agregar Producto</h2>
<div class="form-container">
  <form [formGroup]="form" (ngSubmit)="guardar()" class="form">
    <input placeholder="Nombre" formControlName="nombre">
    <input placeholder="Categoría" formControlName="categoria">
    <input placeholder="Marca" formControlName="marca">
    <input type="number" placeholder="Precio" formControlName="precio">
    <input type="number" placeholder="Stock" formControlName="stock">
    <input placeholder="Imagen (ej: tote_bag_1.jpg)" formControlName="imagen">
    <textarea placeholder="Descripción" formControlName="descripcion"></textarea>
    <button type="submit">Guardar producto</button>
  </form>
</div>
