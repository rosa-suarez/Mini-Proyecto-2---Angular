<h2>Catálogo de Bolsas</h2>

<div *ngIf="productos === null">
  <p>Cargando...</p>
</div>

<div *ngIf="productos?.length === 0">
  <p>No hay productos</p>
</div>


<div *ngIf="productos && productos.length > 0">
  <div *ngFor="let p of productos">
    
    <h3>{{ p.nombre | uppercase }}</h3>
    <p>{{ p.precio | currency }}</p>

    <button [routerLink]="['/producto', p.id]">
      Ver detalle
    </button>

    <button (click)="agregar(p)">Agregar al carrito</button>

    <hr>

  </div>
</div>
