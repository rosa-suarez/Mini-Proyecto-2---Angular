<h2>Contacto</h2>

<div class="form-container">
  <form #f="ngForm" (ngSubmit)="enviar(f)" class="form">
    <input name="nombre" ngModel placeholder="Nombre completo">
    <input name="correo" ngModel placeholder="Correo electrónico">
    <input name="asunto" ngModel placeholder="Asunto">
    <textarea name="mensaje" ngModel placeholder="Escribe tu mensaje"></textarea>
    <button type="submit">Enviar mensaje</button>
  </form>
</div>
